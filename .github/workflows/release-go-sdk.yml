name: Release Go SDK

on:
  push:
    tags:
      - 'sdk/go/focusmodule/v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Parse version
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#sdk/go/focusmodule/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Go SDK v$VERSION"

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          NOTES=$(awk '/^## \['"$VERSION"'\]/{found=1; next} /^## \[/{if(found) exit} found{print}' \
            sdk/go/focusmodule/CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            NOTES="Release v$VERSION"
          fi

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "body<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Go SDK v${{ steps.meta.outputs.version }}" \
            --notes "${{ steps.notes.outputs.body }}"
