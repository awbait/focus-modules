name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  biome:
    name: Biome (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - run: bunx biome check

      - name: Validate community-modules.json
        run: bun run validate:registry

  golangci-lint:
    name: golangci-lint (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Install golangci-lint
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b "$(go env GOPATH)/bin" v2.11.4

      - name: Lint all Go modules
        run: |
          status=0
          for dir in $(find . -name 'go.mod' -not -path '*/vendor/*' -not -path '*/node_modules/*' -exec dirname {} \;); do
            echo "==> Linting $dir"
            (cd "$dir" && golangci-lint run) || status=1
          done
          exit $status
