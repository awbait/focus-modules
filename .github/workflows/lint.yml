name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  biome:
    name: Biome (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - run: bunx biome check

      - name: Validate community-modules.json
        run: bun run validate:registry

  discover-go:
    name: Discover Go modules
    runs-on: ubuntu-latest
    outputs:
      directories: ${{ steps.find.outputs.directories }}
    steps:
      - uses: actions/checkout@v6

      - name: Find Go modules
        id: find
        run: |
          dirs=$(find . -name 'go.mod' -not -path '*/vendor/*' -not -path '*/node_modules/*' -exec dirname {} \; | sed 's|^\./||' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "directories=$dirs" >> "$GITHUB_OUTPUT"

  golangci-lint:
    name: golangci-lint (Go)
    needs: discover-go
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory: ${{ fromJson(needs.discover-go.outputs.directories) }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ matrix.directory }}/go.mod

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
          working-directory: ${{ matrix.directory }}
