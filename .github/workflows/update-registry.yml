name: Update registry

# Triggered manually or via repository_dispatch from module repos.
# Module repos call this after a successful release:
#   curl -X POST https://api.github.com/repos/awbait/focus-modules/dispatches \
#     -H "Authorization: Bearer $TOKEN" \
#     -d '{"event_type":"module-released","client_payload":{"id":"domovoy-control","version":"0.2.0"}}'
on:
  workflow_dispatch:
    inputs:
      module_id:
        description: 'Module id'
        required: true
      version:
        description: 'New version (without v prefix)'
        required: true
  repository_dispatch:
    types: [module-released]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve inputs
        id: inputs
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "id=${{ github.event.client_payload.id }}" >> $GITHUB_OUTPUT
            echo "version=${{ github.event.client_payload.version }}" >> $GITHUB_OUTPUT
          else
            echo "id=${{ github.event.inputs.module_id }}" >> $GITHUB_OUTPUT
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Update version in community-modules.json
        run: |
          ID="${{ steps.inputs.outputs.id }}"
          VERSION="${{ steps.inputs.outputs.version }}"
          jq --arg id "$ID" --arg v "$VERSION" \
            'map(if .id == $id then .version = $v else . end)' \
            community-modules.json > community-modules.tmp.json
          mv community-modules.tmp.json community-modules.json
          echo "Updated $ID → v$VERSION"
          cat community-modules.json

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add community-modules.json
          git diff --staged --quiet || \
            git commit -m "chore: update ${{ steps.inputs.outputs.id }} to v${{ steps.inputs.outputs.version }}"
          git push
